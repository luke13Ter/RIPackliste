<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Packliste – Rock im Park 🎸</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #e8ff00;
    --accent2: #ff3c3c;
    --p1-color: #00d4ff;
    --p2-color: #ff8c42;
    --shared-color: #b57bff;
    --text: #f0f0f0;
    --text-muted: #666;
    --checked: #1a1a1a;
    --checked-text: #3a3a3a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding-bottom: 80px; }

  header { background: var(--surface); border-bottom: 2px solid var(--accent); padding: 20px 20px 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 40px rgba(232,255,0,0.06); }
  .header-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .title-block h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(26px, 5vw, 44px); letter-spacing: 3px; color: var(--accent); line-height: 1; }
  .title-block p { font-size: 11px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }
  .progress-block { text-align: right; }
  .progress-numbers { font-family: 'Bebas Neue', sans-serif; font-size: 28px; line-height: 1; }
  .progress-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .progress-bar-wrap { width: 100%; height: 3px; background: var(--border); margin-top: 12px; border-radius: 2px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 2px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); width: 0%; }

  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tab { flex: 1; padding: 12px 8px 10px; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; border-bottom: 3px solid transparent; color: var(--text-muted); transition: all 0.2s; background: none; border-left: none; border-right: none; border-top: none; white-space: nowrap; text-align: center; }
  .tab.active { color: var(--text); }
  .tab:hover:not(.active) { color: #aaa; }
  .tab-p1.active { border-bottom-color: var(--p1-color); }
  .tab-p2.active { border-bottom-color: var(--p2-color); }
  .tab-shared.active { border-bottom-color: var(--shared-color); }
  .tab .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  .tab-p1 .dot { background: var(--p1-color); }
  .tab-p2 .dot { background: var(--p2-color); }
  .tab-shared .dot { background: var(--shared-color); }

  .name-input { background: transparent; border: none; border-bottom: 1px dashed var(--border); color: inherit; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; width: 80px; text-align: center; outline: none; padding: 1px 2px; transition: border-color 0.2s; }
  .name-input:focus { border-bottom-color: var(--accent); color: var(--accent); }
  .name-input::placeholder { color: var(--text-muted); }

  .stats-bar { display: flex; gap: 0; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .stat { flex: 1; padding: 10px 12px; display: flex; flex-direction: column; align-items: center; gap: 2px; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 18px; line-height: 1; }
  .stat-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; text-align: center; }

  main { max-width: 680px; margin: 0 auto; padding: 20px 14px; }
  .view { display: none; }
  .view.active { display: block; }

  .category { margin-bottom: 26px; }
  .category-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; padding-bottom: 7px; border-bottom: 1px solid var(--border); }
  .category-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--text); }
  .category-count { font-size: 11px; color: var(--text-muted); font-weight: 500; }

  /* ITEM */
  .item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 7px; margin-bottom: 3px;
    border: 1px solid transparent;
    position: relative; overflow: hidden;
    transition: background 0.15s;
  }
  .item-main {
    display: flex; align-items: center; gap: 12px; flex: 1; cursor: pointer;
    user-select: none;
  }
  .item:hover { background: var(--surface2); border-color: var(--border); }
  .item.checked { opacity: 0.38; background: var(--checked); }
  .item.checked .item-label { text-decoration: line-through; color: var(--checked-text); }

  .checkbox { width: 20px; height: 20px; border-radius: 5px; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .item.checked .checkbox { border-color: var(--accent); background: var(--accent); }
  .checkbox-tick { opacity: 0; font-size: 11px; color: #000; font-weight: 800; transition: opacity 0.15s; }
  .item.checked .checkbox-tick { opacity: 1; }
  .item-label { flex: 1; font-size: 14px; transition: color 0.2s; }

  /* DELETE BUTTON */
  .delete-btn {
    width: 28px; height: 28px; border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    opacity: 0;
  }
  .item:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { background: rgba(255,60,60,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* ADD ITEM ROW */
  .add-item-row { display: flex; align-items: center; gap: 8px; padding: 6px 12px; margin-top: 4px; }
  .add-item-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 7px 10px; outline: none; transition: border-color 0.2s; }
  .add-item-input:focus { border-color: var(--accent); }
  .add-item-input::placeholder { color: var(--text-muted); font-size: 12px; }
  .add-item-btn { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 18px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .add-item-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(232,255,0,0.06); }

  .reset-btn { display: block; margin: 28px auto 0; padding: 10px 28px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
  .reset-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* MODE BAR */
  .mode-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .mode-label { white-space: nowrap; }
  .mode-toggle { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; flex: 1; }
  .mode-btn { flex: 1; padding: 7px 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; background: transparent; border: none; color: var(--text-muted); cursor: pointer; transition: all 0.2s; text-align: center; white-space: nowrap; }
  .mode-btn.active { background: var(--surface2); color: var(--text); }
  .mode-btn.mode-p1.active { color: var(--p1-color); }
  .mode-btn.mode-p2.active { color: var(--p2-color); }
  .mode-btn.mode-both.active { color: var(--accent); }
  .tab.tab-disabled { opacity: 0.3; pointer-events: none; }
  .stat.stat-disabled { opacity: 0.3; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="title-block">
      <h1>Rock im Park</h1>
      <p>Packliste 2025</p>
    </div>
    <div class="progress-block">
      <div class="progress-numbers" id="progress-numbers" style="color: var(--accent)">0/0</div>
      <div class="progress-label">Eingepackt</div>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar" style="background: var(--accent)"></div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat">
    <span class="stat-value" id="stat-p1" style="color:var(--p1-color)">0/0</span>
    <span class="stat-label" id="stat-label-p1">Ich</span>
  </div>
  <div class="stat">
    <span class="stat-value" id="stat-p2" style="color:var(--p2-color)">0/0</span>
    <span class="stat-label" id="stat-label-p2">Sie</span>
  </div>
  <div class="stat">
    <span class="stat-value" id="stat-shared" style="color:var(--shared-color)">0/0</span>
    <span class="stat-label">Gemeinsam</span>
  </div>
</div>

<div class="tabs">
  <button class="tab tab-p1 active" id="tab-p1" onclick="switchTab('p1')">
    <span class="dot"></span><span class="name-display" id="name-display-p1">Ich</span>
  </button>
  <button class="tab tab-p2" id="tab-p2" onclick="switchTab('p2')">
    <span class="dot"></span><span class="name-display" id="name-display-p2">Sie</span>
  </button>
  <button class="tab tab-shared" onclick="switchTab('shared')">
    <span class="dot"></span>Gemeinsam
  </button>
</div>

<div id="name-edit-bar" style="background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);">
  <span>✏️ Name:</span>
  <input class="name-input" id="name-input-p1" placeholder="Dein Name" maxlength="16" style="display:none;color:var(--p1-color);border-bottom-color:rgba(0,212,255,0.3)">
  <input class="name-input" id="name-input-p2" placeholder="Ihr Name" maxlength="16" style="display:none;color:var(--p2-color);border-bottom-color:rgba(255,140,66,0.3)">
</div>

<div class="mode-bar">
  <span class="mode-label">Ich packe für:</span>
  <div class="mode-toggle">
    <button class="mode-btn mode-p1 active" id="mode-btn-p1" onclick="setMode('p1')">Nur mich</button>
    <button class="mode-btn mode-both" id="mode-btn-both" onclick="setMode('both')">Uns beide</button>
    <button class="mode-btn mode-p2" id="mode-btn-p2" onclick="setMode('p2')">Nur Sie</button>
  </div>
</div>

<main>
  <div class="view active" id="view-p1"></div>
  <div class="view" id="view-p2"></div>
  <div class="view" id="view-shared"></div>
  <button class="reset-btn" onclick="resetCurrent()">↺ Aktuellen Tab zurücksetzen</button>
</main>

<script>
// ── BASE DATA ─────────────────────────────────────────────────────────────────
const baseData = [
  { category: "Dokumente & Wertsachen", items: [

    { id: "unterhosen_p2", label: "Unterhosen ×5", type: "p2" },
    { id: "pulli_p1", label: "Pulli ×1", type: "p1" },
    { id: "pulli_p2", label: "Pulli ×1", type: "p2" },
    { id: "tshirt_p1", label: "T-Shirt ×3", type: "p1" },
    { id: "tshirt_p2", label: "T-Shirt ×3", type: "p2" },
    { id: "kurzehose_p1", label: "Kurze Hose ×2", type: "p1" },
    { id: "kurzehose_p2", label: "Kurze Hose ×2", type: "p2" },
    { id: "jogginghose_p1", label: "Jogginghose", type: "p1" },
    { id: "jogginghose_p2", label: "Jogginghose", type: "p2" },
    { id: "gummistiefel_p1", label: "Gummistiefel / Wanderschuhe", type: "p1" },
    { id: "gummistiefel_p2", label: "Gummistiefel / Wanderschuhe", type: "p2" },
    { id: "schlappen_p1", label: "Schlappen", type: "p1" },
    { id: "schlappen_p2", label: "Schlappen", type: "p2" },
    { id: "poncho_p1", label: "Poncho", type: "p1" },
    { id: "poncho_p2", label: "Poncho", type: "p2" },
    { id: "ersatzschuhe_p1", label: "Ersatzschuhe", type: "p1" },
    { id: "ersatzschuhe_p2", label: "Ersatzschuhe", type: "p2" },
    { id: "cap_p1", label: "Cap", type: "p1" },
    { id: "cap_p2", label: "Cap", type: "p2" },
    { id: "sonnenbrille_p1", label: "Sonnenbrille", type: "p1" },
    { id: "sonnenbrille_p2", label: "Sonnenbrille", type: "p2" },
    { id: "langehose_p1", label: "Lange Hose", type: "p1" },
    { id: "langehose_p2", label: "Lange Hose", type: "p2" },
    { id: "schlafsachen_p1", label: "Schlafsachen", type: "p1" },
    { id: "schlafsachen_p2", label: "Schlafsachen", type: "p2" },
  ]},
  { category: "Küche, Essen & Getränke", items: [
    { id: "gaskocher", label: "Gaskocher", type: "shared" },
    { id: "pfanne", label: "Pfanne / Topf", type: "shared" },
    { id: "besteck", label: "Besteck", type: "shared" },
    { id: "doseoeffner", label: "Dosenöffner", type: "shared" },
    { id: "trichter", label: "Trichter", type: "shared" },
    { id: "trinkbeutel", label: "Faltbarer Trinkbeutel", type: "shared" },
    { id: "wasserkanister", label: "Wasserkanister", type: "shared" },
    { id: "muellbeutel", label: "Müllbeutel", type: "shared" },

    { id: "energydrinks", label: "Energy Drinks (Fahrt/Nacht)", type: "shared" },
    { id: "verpflegung", label: "Verpflegung", type: "shared" },

    { id: "radler", label: "Radler", type: "shared" },
  ]},
  { category: "Hygiene & Gesundheit", items: [
    { id: "klopapier", label: "Klopapier", type: "shared" },
    { id: "taschentuecher", label: "Taschentücher", type: "shared" },
    { id: "feuchtuecher", label: "Feuchttücher", type: "shared" },
    { id: "duschgel_p1", label: "Duschgel", type: "p1" },
    { id: "duschgel_p2", label: "Duschgel", type: "p2" },
    { id: "shampoo", label: "Shampoo", type: "p2" },
    { id: "deo_p1", label: "Deo", type: "p1" },
    { id: "deo_p2", label: "Deo", type: "p2" },
    { id: "desinfekt", label: "Desinfektionsmittel", type: "shared" },
    { id: "zahnbuerste_p1", label: "Zahnbürste + Zahnpasta", type: "p1" },
    { id: "zahnbuerste_p2", label: "Zahnbürste + Zahnpasta", type: "p2" },
    { id: "handtuecher", label: "Handtücher", type: "shared" },
    { id: "pflaster", label: "Pflaster", type: "shared" },

    { id: "sonnencreme", label: "Sonnencreme", type: "shared" },
    { id: "autan", label: "Autan", type: "shared" },
    { id: "ohrstoepsel_p1", label: "Ohrstöpsel", type: "p1" },
    { id: "ohrstoepsel_p2", label: "Ohrstöpsel", type: "p2" },
    { id: "damenhygiene", label: "Damenhygieneartikel", type: "p2" },
  ]},
  { category: "Technik & Licht", items: [
    { id: "powerbank", label: "Powerbank ×2", type: "shared" },
    { id: "ladekabel", label: "Ladekabel", type: "shared" },
    { id: "taschenlampe", label: "Taschenlampe", type: "shared" },
    { id: "musikbox", label: "Musikbox", type: "shared" },
    { id: "walkie", label: "Walkie Talkies", type: "shared" },
    { id: "kopfhoerer_p1", label: "Kopfhörer", type: "p1" },
    { id: "kopfhoerer_p2", label: "Kopfhörer", type: "p2" },
  ]},
  { category: "Werkzeug & Nützliches", items: [
    { id: "panzertape", label: "Panzertape", type: "shared" },
    { id: "taschenmesser", label: "Taschenmesser", type: "shared" },
    { id: "lappen", label: "Lappen (Dreck)", type: "shared" },
    { id: "akkuschrauber", label: "Parkside Akkuschrauber", type: "shared" },
  ]},
  { category: "Freizeit & Sonstiges", items: [
    { id: "vape", label: "Vape", type: "shared" },
  ]},
];

// ── STATE ─────────────────────────────────────────────────────────────────────
const STORAGE_KEY = "rip2025_v3";
let state = {
  checked: [],
  names: { p1: "", p2: "" },
  deleted: [],       // IDs of deleted base items
  custom: [],         // { id, label, type, category }
  mode: "p1"          // "p1" | "p2" | "both"
};
let currentTab = "p1";

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = { ...state, ...JSON.parse(raw) };
  } catch(e) {}
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

// Merge base + custom, filter deleted
function getEffectiveData() {
  return baseData.map(cat => ({
    category: cat.category,
    items: cat.items.filter(i => !state.deleted.includes(i.id))
  }));
}

function isChecked(id) { return state.checked.includes(id); }

function toggle(id) {
  if (isChecked(id)) state.checked = state.checked.filter(x => x !== id);
  else state.checked.push(id);
  save(); renderAll(); updateStats();
}

function deleteItem(id) {
  const isBase = baseData.flatMap(c => c.items).some(i => i.id === id);
  if (isBase) {
    state.deleted.push(id);
  } else {
    state.custom = state.custom.filter(c => c.id !== id);
  }
  state.checked = state.checked.filter(x => x !== id);
  save(); renderAll(); updateStats();
}

function addItem(label, type) {
  if (!label.trim()) return;
  const id = 'custom_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  state.custom.push({ id, label: label.trim(), type });
  save(); renderAll(); updateStats();
}

function resetCurrent() {
  const label = currentTab === 'p1' ? (state.names.p1 || 'Ich') : currentTab === 'p2' ? (state.names.p2 || 'Sie') : 'Gemeinsam';
  if (!confirm(`Tab "${label}" zurücksetzen?`)) return;
  const data = getEffectiveData();
  const tabItems = data.flatMap(c => c.items).filter(i => i.type === currentTab).map(i => i.id);
  state.checked = state.checked.filter(id => !tabItems.includes(id));
  save(); renderAll(); updateStats();
}

// ── MODE ──────────────────────────────────────────────────────────────────────
function setMode(mode) {
  state.mode = mode;
  save();
  applyMode();
  updateStats();
}

function applyMode() {
  const mode = state.mode || "p1";
  const tabP1 = document.getElementById("tab-p1");
  const tabP2 = document.getElementById("tab-p2");
  const statP1 = document.querySelector(".stat:nth-child(1)");
  const statP2 = document.querySelector(".stat:nth-child(2)");
  ["p1","both","p2"].forEach(m => {
    const b = document.getElementById("mode-btn-" + m); if(b) b.classList.remove("active");
  });
  const bActive = document.getElementById("mode-btn-" + mode); if(bActive) bActive.classList.add("active");
  if (mode === "p1") {
    tabP1.classList.remove("tab-disabled");
    tabP2.classList.add("tab-disabled");
    if (statP1) statP1.classList.remove("stat-disabled");
    if (statP2) statP2.classList.add("stat-disabled");
    if (currentTab === "p2") switchTab("p1");
  } else if (mode === "p2") {
    tabP1.classList.add("tab-disabled");
    tabP2.classList.remove("tab-disabled");
    if (statP1) statP1.classList.add("stat-disabled");
    if (statP2) statP2.classList.remove("stat-disabled");
    if (currentTab === "p1") switchTab("p2");
  } else {
    tabP1.classList.remove("tab-disabled");
    tabP2.classList.remove("tab-disabled");
    if (statP1) statP1.classList.remove("stat-disabled");
    if (statP2) statP2.classList.remove("stat-disabled");
  }
}

// ── NAMES ─────────────────────────────────────────────────────────────────────
function initNames() {
  const inp1 = document.getElementById('name-input-p1');
  const inp2 = document.getElementById('name-input-p2');
  inp1.value = state.names.p1;
  inp2.value = state.names.p2;
  inp1.addEventListener('input', () => { state.names.p1 = inp1.value.trim(); save(); updateNameDisplays(); });
  inp2.addEventListener('input', () => { state.names.p2 = inp2.value.trim(); save(); updateNameDisplays(); });
}

function updateNameDisplays() {
  document.getElementById('name-display-p1').textContent = state.names.p1 || 'Ich';
  document.getElementById('name-display-p2').textContent = state.names.p2 || 'Sie';
  document.getElementById('stat-label-p1').textContent = state.names.p1 || 'Ich';
  document.getElementById('stat-label-p2').textContent = state.names.p2 || 'Sie';
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderCategory(cat, filterType) {
  const items = cat.items.filter(i => i.type === filterType);
  if (items.length === 0) return "";
  const checkedCount = items.filter(i => isChecked(i.id)).length;

  const itemsHtml = items.map(item => `
    <div class="item ${isChecked(item.id) ? 'checked' : ''}" id="item-wrap-${item.id}">
      <div class="item-main" onclick="toggle('${item.id}')">
        <div class="checkbox"><span class="checkbox-tick">✓</span></div>
        <span class="item-label">${item.label}</span>
      </div>
      <button class="delete-btn" onclick="deleteItem('${item.id}')" title="Löschen">✕</button>
    </div>
  `).join('');

  return `
    <div class="category">
      <div class="category-header">
        <span class="category-title">${cat.category}</span>
        <span class="category-count">${checkedCount}/${items.length}</span>
      </div>
      ${itemsHtml}
    </div>
  `;
}

function renderCustomSection(filterType) {
  const customItems = state.custom.filter(c => c.type === filterType);
  const checkedCount = customItems.filter(i => isChecked(i.id)).length;
  const addRowId = `add-custom-${filterType}`;

  const itemsHtml = customItems.map(item => `
    <div class="item ${isChecked(item.id) ? 'checked' : ''}" id="item-wrap-${item.id}">
      <div class="item-main" onclick="toggle('${item.id}')">
        <div class="checkbox"><span class="checkbox-tick">✓</span></div>
        <span class="item-label">${item.label}</span>
      </div>
      <button class="delete-btn" onclick="deleteItem('${item.id}')" title="Löschen">✕</button>
    </div>
  `).join('');

  return `
    <div class="category">
      <div class="category-header">
        <span class="category-title">Eigene Punkte</span>
        <span class="category-count">${checkedCount}/${customItems.length}</span>
      </div>
      ${itemsHtml}
      <div class="add-item-row">
        <input class="add-item-input" id="${addRowId}" placeholder="Punkt hinzufügen..." maxlength="60"
          onkeydown="if(event.key==='Enter'){addFromInput('${addRowId}','${filterType}')}">
        <button class="add-item-btn" onclick="addFromInput('${addRowId}','${filterType}')">+</button>
      </div>
    </div>
  `;
}

function addFromInput(inputId, type) {
  const input = document.getElementById(inputId);
  if (!input) return;
  addItem(input.value, type);
  input.value = '';
}

function renderAll() {
  const data = getEffectiveData();
  ['p1','p2','shared'].forEach(type => {
    document.getElementById(`view-${type}`).innerHTML =
      data.map(cat => renderCategory(cat, type)).join('') +
      renderCustomSection(type);
  });
}

function updateStats() {
  const data = getEffectiveData();
  const allItems = [...data.flatMap(c => c.items), ...state.custom];
  const mode = state.mode || 'p1';

  ['p1','p2','shared'].forEach(type => {
    const items = allItems.filter(i => i.type === type);
    const c = items.filter(i => isChecked(i.id)).length;
    document.getElementById(`stat-${type}`).textContent = `${c}/${items.length}`;
  });

  // Progress bar only counts active tabs based on mode
  const activetypes = mode === 'p1' ? ['p1','shared'] : mode === 'p2' ? ['p2','shared'] : ['p1','p2','shared'];
  const activeItems = allItems.filter(i => activetypes.includes(i.type));
  const activeChecked = activeItems.filter(i => isChecked(i.id)).length;
  const total = activeItems.length;

  document.getElementById('progress-numbers').textContent = `${activeChecked}/${total}`;
  const pct = total ? (activeChecked / total) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

// ── TABS ──────────────────────────────────────────────────────────────────────
const tabColors = { p1: 'var(--p1-color)', p2: 'var(--p2-color)', shared: 'var(--shared-color)' };

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelector(`.tab-${tab}`) && document.querySelector(`.tab-${tab}`).classList.add('active');
  document.getElementById(`view-${tab}`).classList.add('active');
  document.getElementById('progress-bar').style.background = tabColors[tab];
  document.getElementById('progress-numbers').style.color = tabColors[tab];

  const bar = document.getElementById('name-edit-bar');
  const inp1 = document.getElementById('name-input-p1');
  const inp2 = document.getElementById('name-input-p2');
  if (tab === 'p1') { bar.style.display='flex'; inp1.style.display='inline-block'; inp2.style.display='none'; }
  else if (tab === 'p2') { bar.style.display='flex'; inp1.style.display='none'; inp2.style.display='inline-block'; }
  else { bar.style.display='none'; }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
load();
initNames();
updateNameDisplays();
renderAll();
updateStats();
switchTab('p1');
applyMode();
</script>
</body>
</html>
